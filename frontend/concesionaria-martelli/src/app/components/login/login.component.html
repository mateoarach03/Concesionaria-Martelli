<div class="login-container">
  <div class="login-card">
    <h2>Acceso Administrador</h2>
    
    <div *ngIf="errorMessage" class="server-error">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="resetMessage" class="server-success">
      {{ resetMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="admin@martelli.com"
        >
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-message">
          Por favor, ingrese un correo válido.
        </div>
      </div>

      <div class="form-group">
        <div class="password-label-group">
          <label for="password">Contraseña</label>
          <a href="javascript:void(0)" class="forgot-password-link" (click)="onResetPassword()">
            ¿Olvidó su contraseña?
          </a>
        </div>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="********"
        >
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-message">
          La contraseña es obligatoria.
        </div>
      </div>

      <button type="submit" class="login-button" [disabled]="loginForm.invalid || isLoading || isResetLoading">
        <span *ngIf="!isLoading && !isResetLoading">Ingresar</span>
        <span *ngIf="isLoading">Iniciando sesión...</span>
        <span *ngIf="isResetLoading">Enviando petición...</span>
      </button>
    </form>
  </div>
</div>
