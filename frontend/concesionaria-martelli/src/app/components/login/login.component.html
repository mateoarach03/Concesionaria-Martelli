<div class="login-container">
  <div class="login-card">
    <h2>Acceso Administrador</h2>
    
    <div *ngIf="errorMessage" class="server-error">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="admin@martelli.com"
        >
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-message">
          Por favor, ingrese un correo válido.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="********"
        >
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-message">
          La contraseña es obligatoria.
        </div>
      </div>

      <button type="submit" class="login-button" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Iniciando sesión...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
