<div class="login-container">
  <div class="login-card">
    <h2>Restablecer Contraseña</h2>
    <p class="subtitle">Ingrese su nueva contraseña debajo</p>
    
    <div *ngIf="errorMessage" class="server-error">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="server-success">
      {{ successMessage }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      <div class="form-group">
        <label for="password">Nueva contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Min. 6 caracteres"
        >
        <div *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.invalid" class="error-message">
          La contraseña debe tener al menos 6 caracteres.
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword" 
          placeholder="Vuelva a escribir su contraseña"
        >
        <div *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch')" class="error-message">
          Las contraseñas no coinciden.
        </div>
      </div>

      <button type="submit" class="login-button" [disabled]="resetForm.invalid || isLoading">
        <span *ngIf="!isLoading">Actualizar Contraseña</span>
        <span *ngIf="isLoading">Actualizando...</span>
      </button>
    </form>
    
    <div class="actions">
      <a href="/login" class="back-link" *ngIf="!successMessage">Volver al login</a>
    </div>
  </div>
</div>
